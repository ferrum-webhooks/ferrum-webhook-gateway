name: Gateway CI

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TESTING: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Set Python path
      run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

    - name: Run tests
      run: pytest

    - name: Build Docker image
      run: |
        docker build -t ferrum-gateway:${{ github.sha }} .

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Tag image
      run: docker tag ferrum-gateway:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/gateway:${{ github.sha }}
    
    - name: Push image
      run: docker push ghcr.io/${{ github.repository_owner }}/gateway:${{ github.sha }}

    - name: Tag latest
      if: github.ref == 'refs/heads/main'
      run: docker tag ferrum-gateway:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/gateway:latest

    - name: Push latest
      if: github.ref == 'refs/heads/main'
      run: docker push ghcr.io/${{ github.repository_owner }}/gateway:latest